<section class="flex flex-col gap-2">
    @switch (headerType()) {
        @case ("H1") {
            <h1 [id]="id()" class="text-3xl font-extrabold">{{header()}}</h1>
        }
        @case ("H2") {
            <h2 [id]="id()" class="text-2xl font-bold">{{header()}}</h2>
        }
        @case ("H3") {
            <h3 [id]="id()" class="text-xl font-semibold">{{header()}}</h3>
        }
        @case ("H4") {
            <h4 [id]="id()" class="text-lg font-semibold">{{header()}}</h4>
        }
        @case ("H5") {
            <h5 [id]="id()" class="text-sm font-semibold">{{header()}}</h5>
        }
        @case ("H6") {
            <h6 [id]="id()" class="text-xs font-semibold">{{header()}}</h6>
        }
        @default {
            <p>{{header()}}</p>
        }
    }
    <div class="flex flex-col gap-4">
        <ng-content></ng-content>
    </div>
</section>
