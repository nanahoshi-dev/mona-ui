<div class="select-none">
    <ul class="flex flex-col">
        @for (item of visibleSections(); track item.id()) {
            <li class="relative grid grid-cols-[0.75rem_minmax(0,1fr)] gap-4 items-center">
                <span class="absolute bottom-0 left-1 top-0 w-px bg-border" aria-hidden="true"></span>
                <span
                    class="relative z-10 size-2 rounded-full border transition-colors"
                    aria-hidden="true"
                    [class.border-border]="activeSectionId() !== item.id()"
                    [style.background-color]="activeSectionId() === item.id() ? 'var(--color-primary)' : null"
                    [style.border-color]="activeSectionId() === item.id() ? 'var(--color-primary)' : null"></span>
                <a
                    class="block py-1.5 text-sm leading-6 transition-colors cursor-pointer"
                    [attr.aria-current]="activeSectionId() === item.id() ? 'location' : null"
                    [class.font-semibold]="activeSectionId() === item.id()"
                    [class.font-medium]="activeSectionId() !== item.id()"
                    [class.text-muted-foreground]="activeSectionId() !== item.id()"
                    [style.color]="activeSectionId() === item.id() ? 'var(--color-primary)' : null"
                    (click)="navigateToSection($event, item.id())"
                    href="{{ currentRoute() }}#{{ item.id() }}">
                    <span class="block">{{ item.header() }}</span>
                </a>
            </li>
        }
    </ul>
</div>
