<div class="flex flex-col gap-2 p-2">
    <div class="px-2 text-sm font-semibold text-gray-500">{{ group().title }}</div>
    <ul class="w-full flex flex-col gap-2 text-sm font-semibold">
        @for (item of group().items; track item) {
            <li>
                <a class="px-2 py-1 rounded-sm hover:bg-gray-100" routerLink="{{group().path}}/{{item.path}}"
                   routerLinkActive="text-blue-600">{{ item.text }}</a>
            </li>
        }
    </ul>
</div>
