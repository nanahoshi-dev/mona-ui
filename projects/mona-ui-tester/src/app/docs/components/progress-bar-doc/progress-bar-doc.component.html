<app-section id="progressBar" [header]="'Progress Bar'" headerType="H1">
    <p>Displays a progress bar. Can be used to show the progress of a task or the progress of a download.</p>
    <app-section id="usage" [header]="'Usage'" headerType="H2">
        <app-code-viewer [code]="importCode" language="typescript"></app-code-viewer>
    </app-section>
    <app-section id="demo" [header]="'Demo'" headerType="H2">
        <app-progress-bar-demo></app-progress-bar-demo>
    </app-section>
</app-section>
