<app-section id="placeholder" [header]="'Placeholder'" headerType="H1">
    <p>A placeholder is a UI element that provides a visual cue to the user about the expected content or functionality
        of a specific area within a layout.</p>
    <app-section id="usage" [header]="'Usage'" headerType="H2">
        <app-code-viewer [code]="importCode" language="typescript"></app-code-viewer>
    </app-section>
    <app-section id="demo" [header]="'Demo'" headerType="H2">
        <app-placeholder-demo></app-placeholder-demo>
    </app-section>
</app-section>
