<app-section id="comboBox" [header]="'Combo'" headerType="H1">
    <p>A combo box is a UI control that combines a text input field with a dropdown list of options.
        Users can type in the input field to filter the options or select from the dropdown list.</p>
    <app-section id="usage" [header]="'Usage'" headerType="H2">
        <app-code-viewer [code]="importCode" language="typescript"></app-code-viewer>
    </app-section>
    <app-section id="demo" [header]="'Demo'" headerType="H2">
        <app-combo-box-demo></app-combo-box-demo>
    </app-section>
</app-section>
