<app-section id="contextmenu" [header]="'Context Menu'" headerType="H1">
    <p>A context menu is a pop-up menu that appears upon user interaction, such as a right-click, offering a limited set
        of choices relevant to the current state or selected object.</p>
    <app-section id="usage" [header]="'Usage'" headerType="H2">
        <app-code-viewer [code]="importCode" language="typescript"></app-code-viewer>
    </app-section>
    <app-section id="demo" [header]="'Demo'" headerType="H2">
        <app-contextmenu-demo></app-contextmenu-demo>
    </app-section>
</app-section>
