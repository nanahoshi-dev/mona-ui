<app-section id="dropdownList" [header]="'Dropdown List'" headerType="H1">
    <p>A dropdown list is a UI control that displays a selected value by default and expands to reveal a list of mutually exclusive options.
        The user can select exactly one option from the list, which then collapses back into the selected state.</p>
    <app-section id="usage" [header]="'Usage'" headerType="H2">
        <app-code-viewer [code]="importCode" language="typescript"></app-code-viewer>
    </app-section>
    <app-section id="demo" [header]="'Demo'" headerType="H2">
        <app-dropdown-list-demo></app-dropdown-list-demo>
    </app-section>
</app-section>
