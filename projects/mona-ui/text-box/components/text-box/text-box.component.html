@for (prefixTemplate of prefixTemplateList(); track $index) {
    <span class="flex h-full flex-wrap items-center">
        <ng-container *ngTemplateOutlet="prefixTemplate"></ng-container>
    </span>
}
<input
    [disabled]="disabled()"
    [readonly]="readonly()"
    [required]="required()"
    [placeholder]="placeholder()"
    [type]="type()"
    [class]="inputClass()"
    [style]="inputStyle()"
    [attr.aria-invalid]="invalidInput() ? 'true' : null"
    [monaAttributeBinder]="inputAttributes()"
    [ngModel]="value()"
    (ngModelChange)="onValueChange($event)"
    (blur)="onInputBlur($event)"
    (focus)="inputFocus.emit($event)"
    #input />

@let textBoxValue = value();
@if (clearButton() && textBoxValue && textBoxValue.length !== 0) {
    <button monaButton look="link" size="small" class="me-2 p-0" aria-label="Clear" (click)="onClearClick()">
        <svg lucideX class="size-4 opacity-50 hover:opacity-90"></svg>
    </button>
}

@for (suffixTemplate of suffixTemplateList(); track $index) {
    <span class="flex h-full flex-wrap items-center">
        <ng-container *ngTemplateOutlet="suffixTemplate"></ng-container>
    </span>
}
