<mona-splitter-resizer-handle
    (collapseNext)="collapseNext($event)"
    (collapsePrevious)="collapsePrevious($event)"
    [nextControlsVisible]="nextCollapseControlsVisible()"
    [orientation]="orientation()"
    [previousControlsVisible]="previousCollapseControlsVisible()"
    [resizable]="resizable()">
</mona-splitter-resizer-handle>
