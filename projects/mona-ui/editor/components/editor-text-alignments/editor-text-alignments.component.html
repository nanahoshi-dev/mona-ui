<mona-button-group selection="single" [size]="'small'">
    <button
        monaButton
        [selected]="alignLeftSelected()"
        [toggleable]="false"
        (click)="onAlignLeft()"
        title="Align text left">
        <i class="ri-align-left"></i>
    </button>
    <button
        monaButton
        [selected]="alignCenterSelected()"
        [toggleable]="false"
        (click)="onAlignCenter()"
        title="Center text">
        <i class="ri-align-center"></i>
    </button>
    <button
        monaButton
        [selected]="alignRightSelected()"
        [toggleable]="false"
        (click)="onAlignRight()"
        title="Align text right">
        <i class="ri-align-right"></i>
    </button>
    <button
        monaButton
        [selected]="alignJustifySelected()"
        [toggleable]="false"
        (click)="onAlignJustify()"
        title="Justify">
        <i class="ri-align-justify"></i>
    </button>
</mona-button-group>
