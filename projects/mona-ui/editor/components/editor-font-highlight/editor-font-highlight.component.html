<mona-color-picker
    view="gradient"
    [value]="selectedColor()"
    (valueChange)="onColorChange($event)"
    [size]="'small'"
    title="Background color">
    <ng-template monaColorPickerValueTemplate let-color>
        <div [class]="highlightValueClass()">
            <i class="ri-drop-fill"></i>
            <span [class]="highlightPreviewClass()" [style.background-color]="color"></span>
        </div>
    </ng-template>
</mona-color-picker>
