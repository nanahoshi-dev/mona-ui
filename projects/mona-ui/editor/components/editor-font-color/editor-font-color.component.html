<mona-color-picker
    view="gradient"
    [size]="'small'"
    [value]="selectedColor()"
    (valueChange)="onColorChange($event)"
    title="Color">
    <ng-template monaColorPickerValueTemplate let-color>
        <div [class]="colorValueClass()">
            <i class="ri-font-family"></i>
            <span [class]="colorPreviewClass()" [style.background-color]="color"></span>
        </div>
    </ng-template>
</mona-color-picker>
