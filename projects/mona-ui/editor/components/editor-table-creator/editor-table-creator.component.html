<div [class]="tableCreatorClass()" (pointerleave)="onCellMouseLeave()">
    @for (rx of [1, 2, 3, 4, 5, 6, 7, 8]; track rx) {
        @for (cx of [1, 2, 3, 4, 5, 6, 7, 8]; track cx) {
            <div
                [class]="tableCreatorCellClass()"
                [style.background-color]="
                    rx <= highlightedCell.row && cx <= highlightedCell.col
                        ? 'var(--color-primary)'
                        : 'var(--color-surface-muted)'
                "
                (click)="onCellClick(rx, cx)"
                (pointerenter)="onCellMouseEnter(rx, cx)"></div>
        }
    }
</div>
