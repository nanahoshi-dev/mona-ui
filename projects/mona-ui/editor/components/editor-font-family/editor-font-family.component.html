<mona-dropdown-list
    [data]="editorService.fonts()"
    [value]="selectedFontFamily()"
    (valueChange)="onFontFamilyChange($event)"
    [size]="'small'"
    [class]="dropdownListClass()"
    title="Select font family">
    <ng-template monaDropDownListItemTemplate let-font>
        <span [style.font-family]="font">{{ font }}</span>
    </ng-template>
</mona-dropdown-list>
