<button monaButton [size]="'small'" (click)="onDisplayInserterClick()" title="Insert image">
    <i class="ri-image-add-line"></i>
</button>

@if (inserterVisible()) {
    <mona-window
        [width]="400"
        [modal]="false"
        [title]="'Insert Image'"
        [minimizable]="false"
        [maximizable]="false"
        (close)="onInserterClose()">
        <ng-template monaWindowContentTemplate>
            <mona-editor-image-inserter
                (insert)="onImageInsert($event)"
                (cancel)="onInsertCancel()"></mona-editor-image-inserter>
        </ng-template>
    </mona-window>
}
