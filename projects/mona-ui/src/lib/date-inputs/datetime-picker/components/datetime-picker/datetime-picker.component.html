<mona-text-box (inputBlur)="onDateInputBlur()"
               (ngModelChange)="onDateStringEdit($event)"
               [clearButton]="showClearButton()"
               [disabled]="disabled()"
               [inputAttributes]="inputAttributes()"
               [ngModel]="currentDateString()"
               [readonly]="readonly()"
               [required]="required()">
    <ng-template monaTextBoxSuffixTemplate>
        <button monaButton look="ghost" [iconOnly]="true" class="rounded-none"
                (click)="onDateInputButtonClick()"
                [disabled]="disabled()" [tabindex]="-1">
            <i class="ri-calendar-line"></i>
        </button>
    </ng-template>
</mona-text-box>

<ng-template #datePopupTemplate>
    <div [class]="pickerPopupClass()" [id]="popupId" class="flex flex-col h-68"
         aria-label="Date and time picker" role="dialog"
         cdkTrapFocus>
        <div [class]="headerClass()">
            <mona-button-group selection="single" [allowEmpty]="false" class="w-full" [disabled]="disabled()">
                <button monaButton [selected]="activeView() === 'date'" (click)="activeView.set('date')">
                    Date
                </button>
                <button monaButton [selected]="activeView() === 'time'" (click)="activeView.set('time')">
                    Time
                </button>
            </mona-button-group>
        </div>
        <div class="overflow-hidden">
            @if (activeView() === 'date') {
                <div class="h-full flex items-center justify-center">
                    <mona-calendar [disabledDates]="disabledDates()" [min]="min()" [max]="max()"
                                   [firstDay]="firstDay()"
                                   [ngModel]="navigatedDate()"
                                   [disabled]="disabled()"
                                   (ngModelChange)="onCalendarValueChange($event)"
                                   class="shadow-none border-none flex-1"></mona-calendar>
                </div>
            }
            @if (activeView() === 'time') {
                <div class="h-full flex items-center justify-center max-h-64">
                    <mona-time-selector [ngModel]="navigatedDate()" (ngModelChange)="onTimeSelectorValueChange($event)"
                                        [disabled]="disabled()"
                                        [max]="timePickerMax()" [min]="timePickerMin()" [footer]="false"
                                        [hourStep]="hourStep()" [minuteStep]="minuteStep()" [secondStep]="secondStep()"
                                        [hourFormat]="hourFormat()" [showSeconds]="showSeconds()"></mona-time-selector>
                </div>
            }
        </div>
        <div [class]="footerClass()">
            <button monaButton look="primary" [disabled]="disabled()" (click)="onSetDateClick()">Set</button>
            <button monaButton look="default" [disabled]="disabled()" (click)="onCancelClick()">Cancel</button>
        </div>
    </div>
</ng-template>
