<mona-text-box
    (inputBlur)="onDateInputBlur()"
    (ngModelChange)="onDateStringEdit($event)"
    [clearButton]="showClearButton()"
    [disabled]="disabled()"
    [inputAttributes]="inputAttributes()"
    [ngModel]="currentDateString()"
    [placeholder]="placeholder()"
    [readonly]="readonly() || readonlyInput()"
    [required]="required()"
    [rounded]="rounded()"
    [size]="size()">
    @if (prefixTemplate()) {
        <ng-template monaTextBoxPrefixTemplate>
            <ng-container [ngTemplateOutlet]="prefixTemplate()"></ng-container>
        </ng-template>
    }
    <ng-template monaTextBoxSuffixTemplate>
        <button
            monaButton
            look="ghost"
            [iconOnly]="true"
            [size]="size()"
            [rounded]="'none'"
            [attr.aria-label]="'Open date and time picker'"
            [attr.aria-expanded]="expanded()"
            [attr.aria-controls]="popupId"
            (click)="onDateInputButtonClick()"
            [disabled]="disabled()"
            [tabindex]="-1">
            <i class="ri-calendar-line"></i>
        </button>
    </ng-template>
</mona-text-box>

<ng-template #datePopupTemplate>
    <div
        [class]="pickerPopupClass()"
        [id]="popupId"
        class="flex flex-col h-68"
        aria-modal="true"
        role="dialog"
        cdkTrapFocus>
        <div [class]="headerClass()">
            <mona-button-group
                selection="single"
                [allowEmpty]="false"
                class="w-full"
                [disabled]="disabled()"
                [size]="size()"
                [rounded]="rounded()"
                role="tablist">
                <button monaButton [selected]="activeView() === 'date'" (click)="activeView.set('date')" role="tab">
                    Date
                </button>
                <button monaButton [selected]="activeView() === 'time'" (click)="activeView.set('time')" role="tab">
                    Time
                </button>
            </mona-button-group>
        </div>
        <div class="overflow-hidden">
            @if (activeView() === "date") {
                <div class="h-full flex items-center justify-center" aria-label="Calendar">
                    <mona-calendar
                        [disabledDates]="disabledDates()"
                        [min]="min()"
                        [max]="max()"
                        [firstDay]="firstDay()"
                        [weekNumber]="weekNumber()"
                        [ngModel]="navigatedDate()"
                        [disabled]="disabled()"
                        [rounded]="rounded()"
                        (ngModelChange)="onCalendarValueChange($event)"
                        class="shadow-none border-none flex-1">
                        @if (decadeCellTemplate()) {
                            <ng-template monaCalendarDecadeCellTemplate let-year>
                                <ng-container
                                    [ngTemplateOutlet]="$safeNavigationMigration(decadeCellTemplate()?.templateRef)"
                                    [ngTemplateOutletContext]="{ $implicit: year }"></ng-container>
                            </ng-template>
                        }
                        @if (monthCellTemplate()) {
                            <ng-template monaCalendarMonthCellTemplate let-day let-date="date">
                                <ng-container
                                    [ngTemplateOutlet]="$safeNavigationMigration(monthCellTemplate()?.templateRef)"
                                    [ngTemplateOutletContext]="{ $implicit: day, date }"></ng-container>
                            </ng-template>
                        }
                        @if (yearCellTemplate()) {
                            <ng-template monaCalendarYearCellTemplate let-year let-text="text">
                                <ng-container
                                    [ngTemplateOutlet]="$safeNavigationMigration(yearCellTemplate()?.templateRef)"
                                    [ngTemplateOutletContext]="{ $implicit: year, text }"></ng-container>
                            </ng-template>
                        }
                    </mona-calendar>
                </div>
            }
            @if (activeView() === "time") {
                <div class="h-full flex items-center justify-center max-h-64" aria-label="Time picker">
                    <mona-time-selector
                        [ngModel]="navigatedDate()"
                        (ngModelChange)="onTimeSelectorValueChange($event)"
                        [disabled]="disabled()"
                        [max]="timePickerMax()"
                        [min]="timePickerMin()"
                        [footer]="false"
                        [size]="size()"
                        [rounded]="rounded()"
                        [hourStep]="hourStep()"
                        [minuteStep]="minuteStep()"
                        [secondStep]="secondStep()"
                        [hourFormat]="hourFormat()"
                        [showSeconds]="showSeconds()"></mona-time-selector>
                </div>
            }
        </div>
        <div [class]="footerClass()">
            <button
                monaButton
                look="primary"
                [disabled]="disabled()"
                [rounded]="rounded()"
                [size]="size()"
                (click)="onSetDateClick()">
                Set
            </button>
            <button
                monaButton
                look="default"
                [disabled]="disabled()"
                [rounded]="rounded()"
                [size]="size()"
                (click)="onCancelClick()">
                Cancel
            </button>
        </div>
    </div>
</ng-template>
