<mona-text-box [readonly]="readonly()"
               [ngModel]="currentDateString()"
               (ngModelChange)="onDateStringEdit($event)"
               (inputBlur)="onDateInputBlur()">
    <ng-template monaTextBoxSuffixTemplate>
        <button monaButton look="ghost" [iconOnly]="true" class="rounded-none" (click)="onDateInputButtonClick()"
                [disabled]="disabled()" [tabindex]="-1">
            <i class="ri-calendar-line"></i>
        </button>
    </ng-template>
</mona-text-box>

<ng-template #datePopupTemplate>
    <div [class]="pickerPopupClass()" [id]="popupId" class="flex flex-col h-68" cdkTrapFocus>
        <div [class]="headerClass()">
            <mona-button-group selection="single" [allowEmpty]="false" class="w-full">
                <button monaButton [selected]="activeView() === 'date'" (click)="activeView.set('date')">
                    Date
                </button>
                <button monaButton [selected]="activeView() === 'time'" (click)="activeView.set('time')">
                    Time
                </button>
            </mona-button-group>
        </div>
        <div class="overflow-hidden">
            @if (activeView() === 'date') {
                <div class="h-full flex items-center justify-center">
                    <mona-calendar [disabledDates]="disabledDates()" [min]="min()" [max]="max()"
                                   [ngModel]="navigatedDate()"
                                   (ngModelChange)="onCalendarValueChange($event)"
                                   class="shadow-none border-none flex-1"></mona-calendar>
                </div>
            }
            @if (activeView() === 'time') {
                <div class="h-full flex items-center justify-center max-h-64">
                    <mona-time-selector [ngModel]="navigatedDate()" (ngModelChange)="onTimeSelectorValueChange($event)"
                                        [max]="timePickerMax()" [min]="timePickerMin()" [footer]="false"
                                        [hourFormat]="hourFormat()" [showSeconds]="showSeconds()"></mona-time-selector>
                </div>
            }
        </div>
        <div [class]="footerClass()">
            <button monaButton look="primary" (click)="onSetDateClick()">Set</button>
            <button monaButton look="default">Cancel</button>
        </div>
    </div>
</ng-template>
