<mona-text-box
    [disabled]="disabled()"
    [readonly]="readonly() || readonlyInput()"
    [required]="required()"
    [value]="currentDateString()"
    [inputAttributes]="inputAttributes()"
    [invalid]="invalid()"
    [placeholder]="placeholder()"
    [rounded]="rounded()"
    [size]="size()"
    [touched]="touched()"
    [clearButton]="showClearButton()"
    (valueChange)="onDateStringEdit($event)"
    (inputBlur)="onTimeInputBlur()">
    <ng-template monaTextBoxSuffixTemplate>
        <button
            monaButton
            look="ghost"
            [iconOnly]="true"
            [size]="size()"
            [rounded]="'none'"
            (click)="onTimeInputButtonClick()"
            class="h-full w-auto aspect-square"
            [attr.aria-label]="'Open time picker'"
            [attr.aria-expanded]="expanded()"
            [attr.aria-controls]="popupId"
            [disabled]="disabled() || readonly()"
            [tabindex]="-1">
            <i class="ri-time-line"></i>
        </button>
    </ng-template>
</mona-text-box>

<ng-template #timePopupTemplate>
    <div
        [class]="pickerPopupClass()"
        [id]="popupId"
        aria-modal="true"
        role="dialog"
        aria-label="Time picker"
        cdkTrapFocus>
        <mona-time-selector
            [value]="value()"
            (valueChange)="onTimeSelectorValueChange($event)"
            [max]="max()"
            [min]="min()"
            [disabled]="disabled()"
            [readonly]="readonly()"
            [hourFormat]="hourFormat()"
            [hourStep]="hourStep()"
            [minuteStep]="minuteStep()"
            [secondStep]="secondStep()"
            [size]="size()"
            [rounded]="rounded()"
            [showSeconds]="showSeconds()"></mona-time-selector>
    </div>
</ng-template>
