<button monaButton [look]="look()" [size]="size()" [disabled]="disabled()" #dropdownButton>
    <ng-content select=":not(mona-menu-item)"></ng-content>
</button>

@if (!disabled()) {
    <mona-contextmenu [target]="dropdownButton" [menuItems]="menuItems()"
                      [offset]="{horizontal: 0, vertical: 4}"
                      [anchorConnectionPoint]="'bottomcenter'"
                      [popupConnectionPoint]="'topcenter'"
                      trigger="click" popupClass="mona-dropdown-button-popup"
                      #contextMenuComponent></mona-contextmenu>
}
