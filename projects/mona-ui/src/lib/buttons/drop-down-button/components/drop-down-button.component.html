<button monaButton [look]="look()" [size]="size()"
        [rounded]="rounded()"
        [disabled]="disabled()" class="w-full h-full" #dropdownButton>
    <ng-content select=":not(mona-menu-item):not(mona-menu-item-group)"></ng-content>
</button>

@if (!disabled()) {
    <mona-contextmenu [anchor]="dropdownButton" [menuItems]="menuItems()"
                      [offset]="{horizontal: 0, vertical: 4}"
                      [anchorConnectionPoint]="'bottomcenter'"
                      [popupConnectionPoint]="'topcenter'"
                      trigger="click" popupClass="mona-dropdown-button-popup"
                      #contextMenuComponent></mona-contextmenu>
}
