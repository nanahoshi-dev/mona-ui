@if (label()) {
    <span>{{ label() }}</span>
} @else {
    <ng-content></ng-content>
}
@if (removable()) {
    @let ariaLabel = "Remove, " + (label() || "item");
    <lucide-angular [name]="removeIcon" [size]="iconSize()" role="button" [tabindex]="disabled() ? null : 0"
                    [attr.aria-label]="ariaLabel"
                    (click)="onRemoveClick($event)" (keydown.enter)="onRemoveClick($event)"
                    (keydown.space)="onRemoveClick($event)"></lucide-angular>
}
