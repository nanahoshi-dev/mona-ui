@if (prefixTemplate()) {
    <ng-container [ngTemplateOutlet]="prefixTemplate()"></ng-container>
}

@if (label()) {
    <span>{{ label() }}</span>
} @else {
    <ng-content></ng-content>
}

@if (removable()) {
    @let removeAriaLabel = "Remove, " + (label() || "item");
    <button
        monaButton
        look="link"
        [iconOnly]="true"
        [size]="'small'"
        [attr.aria-label]="removeAriaLabel"
        [disabled]="disabled()"
        (click)="onRemoveClick($event)"
        [attr.data-chip-remove]="true">
        <svg lucideCircleX [size]="iconSize()"></svg>
    </button>
}
