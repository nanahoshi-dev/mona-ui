<button monaButton (click)="buttonClick.emit($event)" [disabled]="disabled()"
        [look]="look()" [size]="size()"
        class="rounded-tr-none rounded-br-none"
        [tabindex]="tabindex()" #mainButton>
    @if (textTemplate()) {
        <ng-container [ngTemplateOutlet]="textTemplate()??null"></ng-container>
    } @else {
        <span class="mona-split-button-text">{{text()}}</span>
    }
</button>
<button monaButton [disabled]="disabled()"
        [look]="look()" [size]="size()"
        class="rounded-tl-none rounded-bl-none border-l-0"
        [tabindex]="tabindex()" #menuButton>
    <lucide-angular [img]="menuIcon"></lucide-angular>
</button>
<mona-contextmenu [target]="menuButton" trigger="click" [minWidth]="popupWidth()"
                  [anchorConnectionPoint]="'bottomleft'"
                  [popupConnectionPoint]="'topleft'"
                  [offset]="popupOffset()"
                  [menuItems]="menuItems()" #contextMenuComponent ></mona-contextmenu>
