@if (prefixTemplate()) {
    <span [class]="affixClass()">
        <ng-container [ngTemplateOutlet]="prefixTemplate()"></ng-container>
    </span>
}

<input monaTextBox
       [class]="inputClass()"
       [disabled]="disabled()"
       [placeholder]="placeholder()"
       [readonly]="readonly()"
       [required]="required()"
       [ngModel]="comboBoxValue()"
       [attr.aria-activedescendant]="activeDescendant()"
       [attr.aria-autocomplete]="'list'"
       [attr.aria-busy]="loading()"
       [attr.aria-controls]="listId"
       [attr.aria-expanded]="expanded()"
       [attr.aria-haspopup]="'listbox'"
       [attr.aria-label]="ariaLabel() || undefined"
       [attr.aria-labelledby]="ariaLabelledBy() || undefined"
       role="combobox"
       (ngModelChange)="comboBoxValue$.next($event)"
       (blur)="onInputBlur($event)">

<span class="sr-only" aria-live="polite">{{ resultCountMessage() }}</span>

@if (showClearButton() && selectedListItem() && !loading()) {
    <span class="px-2">
        <lucide-angular class="opacity-50 h-full flex items-center justify-center hover:opacity-90"
                        [name]="clearIcon" [size]="14" role="button"
                        aria-label="Clear" title="Clear" [tabindex]="0"
                        (click)="onValueClear($event)" (keydown)="onValueClear($event)"></lucide-angular>
    </span>
}

@if (loading()) {
    <mona-loading-indicator></mona-loading-indicator>
}

<lucide-angular class="opacity-50 h-full flex items-center justify-center aspect-square" [name]="dropdownIcon"
                [size]="18"></lucide-angular>

<ng-template #popupTemplate>
    <div [class]="listPopupClass()">
        <mona-list (itemSelect)="onItemSelect($event)" [focusOnMount]="false" [size]="size()" [listId]="listId">
            @if (footerTemplate()) {
                <ng-template monaListFooterTemplate>
                    <ng-container [ngTemplateOutlet]="footerTemplate()"></ng-container>
                </ng-template>
            }
            @if (groupHeaderTemplate()) {
                <ng-template monaListGroupHeaderTemplate let-group>
                    <ng-container [ngTemplateOutlet]="groupHeaderTemplate()"
                                  [ngTemplateOutletContext]="{$implicit: group}"></ng-container>
                </ng-template>
            }
            @if (headerTemplate()) {
                <ng-template monaListHeaderTemplate>
                    <ng-container [ngTemplateOutlet]="headerTemplate()"></ng-container>
                </ng-template>
            }
            @if (itemTemplate()) {
                <ng-template monaListItemTemplate let-dataItem>
                    <ng-container [ngTemplateOutlet]="itemTemplate()"
                                  [ngTemplateOutletContext]="{$implicit: dataItem}"></ng-container>
                </ng-template>
            }
            @if (noDataTemplate()) {
                <ng-template monaListNoDataTemplate>
                    <ng-container [ngTemplateOutlet]="noDataTemplate()"></ng-container>
                </ng-template>
            }
        </mona-list>
    </div>
</ng-template>
