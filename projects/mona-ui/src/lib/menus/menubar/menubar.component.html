<ul [class]="listClasses()">
    @for (item of menuList(); track item) {
        <li [attr.data-uid]="item.uid" (click)="onMenuClick(contextMenuComponent)"
            (mouseenter)="onMenuMouseEnter(contextMenuComponent)"
            [class]="listItemClasses()"
            [attr.data-active]="currentContextMenu()?.uid===contextMenuComponent.uid"
            [attr.data-disabled]="item.disabled()"
            #listItemElement>
            @if (!item.textTemplate()) {
                <span>{{ item.text() }}</span>
            }
            @if (item.textTemplate()) {
                <ng-container [ngTemplateOutlet]="item.textTemplate() ?? null"
                              [ngTemplateOutletContext]="{$implicit: item.text(), items: item.menuItems()}">
                </ng-container>
            }
            <mona-contextmenu [anchor]="listItemElement" [menuItems]="item.menuItems()" trigger="click"
                              [target]="listItemElement" [precise]="false" [toggleable]="true"
                              [offset]="{vertical: 4}"
                              [size]="size()"
                              [rounded]="rounded()"
                              (menuClick)="onMenuItemClick($event)"
                              (navigate)="onContextMenuNavigate($event)"
                              (close)="onContextMenuClose($event)" (open)="onContextMenuOpen($event)"
                              #contextMenuComponent>
                @if (groupTemplate()) {
                    <ng-template monaMenuGroupTemplate let-item>
                        <ng-container [ngTemplateOutlet]="groupTemplate()??null"
                                      [ngTemplateOutletContext]="{$implicit:item}"></ng-container>
                    </ng-template>
                }
                @if (iconTemplate()) {
                    <ng-template monaMenuItemIconTemplate let-item>
                        <ng-container [ngTemplateOutlet]="iconTemplate()??null"
                                      [ngTemplateOutletContext]="{$implicit:item}"></ng-container>
                    </ng-template>
                }
                @if (shortcutTemplate()) {
                    <ng-template monaMenuItemShortcutTemplate let-item>
                        <ng-container [ngTemplateOutlet]="shortcutTemplate()??null"
                                      [ngTemplateOutletContext]="{$implicit:item}"></ng-container>
                    </ng-template>
                }
                @if (textTemplate()) {
                    <ng-template monaMenuItemTextTemplate let-item>
                        <ng-container [ngTemplateOutlet]="textTemplate()??null"
                                      [ngTemplateOutletContext]="{$implicit:item}"></ng-container>
                    </ng-template>
                }
            </mona-contextmenu>
        </li>
    }
</ul>
