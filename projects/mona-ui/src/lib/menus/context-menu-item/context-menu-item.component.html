<span [class]="iconContainerClasses()">
    @if (menuItem().iconTemplate) {
        <ng-container [ngTemplateOutlet]="menuItem().iconTemplate??null"
                      [ngTemplateOutletContext]="{$implicit: menuItem().options}"></ng-container>
    } @else if (menuItem().iconClass && !menuItem().iconTemplate) {
        <span [ngClass]="menuItem().iconClass"></span>
    }
</span>
<div [class]="textContainerClasses()">
    @if (menuItem().textTemplate) {
        <ng-container [ngTemplateOutlet]="menuItem().textTemplate??null"
                      [ngTemplateOutletContext]="{$implicit: menuItem().options}"></ng-container>
    } @else {
        <span>{{ menuItem().text }}</span>
    }
    @if (menuItem().shortcutTemplate) {
        <span [class]="shortcutContainerClasses()">
            <ng-container [ngTemplateOutlet]="menuItem().shortcutTemplate??null"
                          [ngTemplateOutletContext]="{$implicit: menuItem()}"></ng-container>
        </span>
    }
</div>

@if (menuItem().subMenuItemsSet.length > 0) {
    <span [class]="linkContainerClasses()">
        <lucide-angular [img]="linkIcon" class="w-4 h-4"></lucide-angular>
    </span>
}
