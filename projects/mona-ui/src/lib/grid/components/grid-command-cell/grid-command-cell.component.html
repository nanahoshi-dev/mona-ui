@if (column().commandTemplate) {
    <ng-container
        [ngTemplateOutlet]="column().commandTemplate"
        [ngTemplateOutletContext]="commandContext()"></ng-container>
} @else {
    <div class="flex h-full items-center gap-1 px-1">
        @if (isEditing()) {
            <button
                monaButton
                look="ghost"
                size="small"
                [iconOnly]="true"
                aria-label="Save row"
                title="Save"
                class="w-6 h-6"
                [tabindex]="-1"
                (click)="save($event)">
                <svg lucideCheck [size]="14"></svg>
            </button>
            <button
                monaButton
                look="ghost"
                size="small"
                [iconOnly]="true"
                aria-label="Cancel row edit"
                title="Cancel"
                class="w-6 h-6"
                [tabindex]="-1"
                (click)="cancel($event)">
                <svg lucideX [size]="14"></svg>
            </button>
        } @else {
            <button
                monaButton
                look="ghost"
                size="small"
                [iconOnly]="true"
                aria-label="Edit row"
                title="Edit"
                class="w-6 h-6"
                [tabindex]="-1"
                (click)="edit($event)">
                <svg lucidePencil [size]="14"></svg>
            </button>
            <button
                monaButton
                look="ghost"
                size="small"
                [iconOnly]="true"
                aria-label="Remove row"
                title="Remove"
                class="w-6 h-6"
                [tabindex]="-1"
                (click)="remove($event)">
                <svg lucideTrash2 [size]="14"></svg>
            </button>
        }
    </div>
}
