@let dataItem = row().data;
@let dataKey = column().field;

@if (column().kind === "command") {
    <mona-grid-command-cell [column]="column()" [row]="row()"></mona-grid-command-cell>
} @else {
    <div
        role="gridcell"
        [class]="cellContainerClass()"
        cdkMonitorSubtreeFocus
        [attr.data-uid]="cellUid()"
        [attr.data-ruid]="row().uid"
        [attr.data-field]="dataKey"
        [attr.data-col-index]="column().index"
        [attr.aria-readonly]="!(gridService.editableOptions().enabled && column().editable)"
        (dblclick)="onCellDoubleClick($event)">
        @if (isEditing() && gridService.editSession(); as session) {
            <mona-grid-editor
                [column]="column()"
                [autoFocus]="shouldAutoFocusEditor()"
                [session]="session"
                (commit)="onEditCommit()"
                (cancel)="onEditCancel()"></mona-grid-editor>
        } @else if (column().cellTemplate) {
            <ng-container
                [ngTemplateOutlet]="column().cellTemplate"
                [ngTemplateOutletContext]="{ $implicit: dataItem, column: column().field }"></ng-container>
        } @else {
            <span [class]="cellTextClass()">{{ formattedDisplayValue() }}</span>
        }
        @if (!isCellPristine()) {
            <span aria-hidden="true" [class]="cellDirtyIndicatorClass()" title="Modified"></span>
        }
    </div>
}
