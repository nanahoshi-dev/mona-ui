<span
    [style.width.px]="width()"
    class="inline-flex items-center justify-center h-full aspect-square"
    (click)="onToggleDetailClick($event)">
    @if (expanded()) {
        <lucide-icon [name]="collapseIcon()" [size]="16"></lucide-icon>
    } @else {
        <lucide-icon [name]="expandIcon()" [size]="16"></lucide-icon>
    }
</span>
