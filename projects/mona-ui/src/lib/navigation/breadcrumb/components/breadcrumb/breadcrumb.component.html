<ol [class]="listClass()">
    @for (item of itemComponents(); track $index) {
        <li monaBreadcrumbItem [disabled]="item.disabled()" (click)="onItemClick(item)">
            <ng-container [ngTemplateOutlet]="item.templateRef()"></ng-container>
        </li>

        @if ($index < itemCount() - 1) {
            <li monaBreadcrumbItem>
                @if (separatorTemplate()) {
                    <ng-container
                        [ngTemplateOutlet]="separatorTemplate()"
                        [ngTemplateOutletContext]="{ $implicit: $index }"></ng-container>
                } @else {
                    <lucide-icon [name]="separatorIcon" [size]="18"></lucide-icon>
                }
            </li>
        }
    }
</ol>
