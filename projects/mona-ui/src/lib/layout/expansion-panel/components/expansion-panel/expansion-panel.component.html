<div [class]="headerClass()" (click)="expanded.set(!expanded());">
    <div [class]="headerTitleClass()">
        @if (titleTemplate()) {
            <ng-container [ngTemplateOutlet]="titleTemplate()"></ng-container>
        } @else {
            {{ title() }}
        }
    </div>
    <div>
        @for (action of actionsTemplateList(); track $index) {
            <ng-container [ngTemplateOutlet]="action"></ng-container>
        }
    </div>
    <div [class]="iconContainerClass()">
        @if (iconTemplate()) {
            <ng-container [ngTemplateOutlet]="iconTemplate()"
                          [ngTemplateOutletContext]="{$implicit: expanded()}"></ng-container>
        } @else {
            @if (expanded()) {
                <lucide-angular [name]="collapseIcon" [size]="14"></lucide-angular>
            } @else {
                <lucide-angular [name]="expandIcon" [size]="14"></lucide-angular>
            }
        }
    </div>
</div>
<div [class]="contentClass()">
    <div>
        <ng-content></ng-content>
    </div>
</div>
