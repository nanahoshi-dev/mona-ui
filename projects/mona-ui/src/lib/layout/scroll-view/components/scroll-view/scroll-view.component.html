<div [class]="contentClass()" #contentElement>
    <ul [class]="listClass()">
        @for (item of viewData(); track $index) {
            @if ($index === viewIndex()) {
                <li [animate.enter]="enterAnimation()" [animate.leave]="leaveAnimation()"
                    [style.animation-duration.ms]="animationDuration()">
                    @let width = contentElement.clientWidth;
                    @let height = contentElement.clientHeight;
                    <ng-container [ngTemplateOutlet]="contentTemplate()"
                                  [ngTemplateOutletContext]="{$implicit: item.data, width, height}"></ng-container>
                </li>
            }
        }
    </ul>
</div>
<div [class]="leftArrowClass()" (click)="onArrowClick('left')" [attr.data-navigate-prev]="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
         class="lucide lucide-chevron-left-icon lucide-chevron-left">
        <path d="m15 18-6-6 6-6"/>
    </svg>
</div>
<div [class]="rightArrowClass()" (click)="onArrowClick('right')" [attr.data-navigate-next]="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
         class="lucide lucide-chevron-right-icon lucide-chevron-right">
        <path d="m9 18 6-6-6-6"/>
    </svg>
</div>

@if (pageable()) {
    <div [class]="pagerClass()"
         [style.backdrop-filter]="'blur('+pagerBlur()+'px)'">
        @if (pagerArrowVisible()) {
            <div [class]="pagerArrowClass()"
                 (click)="onPagerScroll(pagerListElement, 'left', 'single')"
                 (mousedown)="onPagerScroll(pagerListElement, 'left', 'continuous')"
                 (mouseup)="onPagerScrollEnd()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="lucide lucide-chevron-left-icon lucide-chevron-left">
                    <path d="m15 18-6-6 6-6"/>
                </svg>
            </div>
        }
        <div [class]="pagerListContainerClass()">
            <ul [class]="pagerListClass()"
                [style.transform]="'translateX('+pagerPosition()+')'"
                #pagerListElement>
                @for (_ of data(); track $index) {
                    <li monaScrollViewActivePage
                        [active]="$index===viewIndex()"
                        [rounded]="pagerRounded()"
                        [attr.data-page-index]="$index"
                        [attr.data-page-item]="true"
                        [attr.data-active-page]="$index===viewIndex()"
                        (click)="onPageClick($index, pagerItemElement)" #pagerItemElement></li>
                }
            </ul>
        </div>
        @if (pagerArrowVisible()) {
            <div [class]="pagerArrowClass()"
                 (click)="onPagerScroll(pagerListElement, 'right', 'single')"
                 (mousedown)="onPagerScroll(pagerListElement, 'right', 'continuous')"
                 (mouseup)="onPagerScrollEnd()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="lucide lucide-chevron-right-icon lucide-chevron-right">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </div>
        }
    </div>
}
