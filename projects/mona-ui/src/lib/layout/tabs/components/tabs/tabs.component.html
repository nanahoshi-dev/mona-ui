<mona-tab-list [closable]="closable()" [rounded]="rounded()" (tabClose)="tabClose.emit($event)"></mona-tab-list>
<div [class]="contentClass()">
    @for (tab of tabList(); track tab) {
        @let tabLoaded = keepTabContent() || tab.selected;
        @let tabHidden = keepTabContent() && !tab.selected;
        @if (tabLoaded) {
            <div class="w-full h-full" [class.hidden]="tabHidden">
                <ng-container [ngTemplateOutlet]="tab.contentTemplate"></ng-container>
            </div>
        }
    }
</div>
