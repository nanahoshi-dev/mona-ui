@for (color of colorScheme().colors; track color; let i = $index) {
    <div [class]="paletteItemClasses()"
         [attr.data-selected]="color===selectedColor()"
         [attr.data-color-index]="i"
         [attr.tabindex]="disabled() ? -1 : (i === 0 ? 0 : -1)"
         [attr.role]="'gridcell'"
         [attr.aria-label]="'Color ' + color"
         [style.background-color]="color"
         (click)="onColorSelect(color)"
         (keydown)="onKeyDown($event, i)"
         (focus)="onColorFocus(i)"
         (blur)="onColorBlur()"></div>
}
