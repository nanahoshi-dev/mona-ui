<div
    [class]="trackClasses()"
    [attr.data-orientation]="orientation()"
    [style.height]="orientation() === 'horizontal' ? sliderTrackSize() : undefined"
    [style.width]="orientation() === 'vertical' ? sliderTrackSize() : undefined"
    [style]="trackBackgroundStyle()">
    <div
        [class]="selectionClasses()"
        [attr.data-orientation]="orientation()"
        [attr.data-dragging]="dragging()"
        [style.left.%]="orientation() === 'horizontal' ? selectionLeft() : undefined"
        [style.right.%]="orientation() === 'horizontal' ? 100 - selectionRight() : undefined"
        [style.bottom.%]="orientation() === 'vertical' ? selectionLeft() : undefined"
        [style.top.%]="orientation() === 'vertical' ? 100 - selectionRight() : undefined"
        [style]="selectionBackgroundStyle()"></div>
</div>
@if (showTicks()) {
    <div [class]="tickListClasses()" [attr.data-orientation]="orientation()">
        @for (tick of renderTicks(); track tick.index) {
            <span
                [class]="tickClasses()"
                [style]="tick | tickStyle: tickStyleArgs()"
                [attr.data-orientation]="orientation()"
                [attr.data-value]="tick.value"
                monaSliderTick>
            </span>
        }
    </div>
}
@if (showTicks() && showLabels()) {
    <div
        [class]="tickLabelListClasses()"
        [attr.data-orientation]="orientation()"
        [attr.data-label-position]="labelPosition()">
        @for (tick of labelTicks(); track tick.index) {
            <span
                [class]="tickLabelClasses()"
                [attr.data-orientation]="orientation()"
                [style]="tick | labelStyle: labelStyleArgs()">
                @if (!tickValueTemplate()) {
                    <span>{{ tick.value }}</span>
                } @else {
                    <span>
                        <ng-container
                            *ngTemplateOutlet="
                                tickValueTemplate() ?? null;
                                context: { $implicit: tick.value }
                            "></ng-container>
                    </span>
                }
            </span>
        }
    </div>
}
<div
    [class]="sliderHandleClasses()"
    [attr.data-orientation]="orientation()"
    [attr.data-dragging]="dragging()"
    [attr.data-focused]="handleFocused()"
    [style]="handleStyle()"
    [style.left.%]="orientation() === 'horizontal' ? handlePosition() : undefined"
    [style.bottom.%]="orientation() === 'vertical' ? handlePosition() : undefined"
    [attr.tabindex]="effectiveDisabled() ? -1 : 0"
    [attr.role]="'slider'"
    [attr.aria-valuemin]="minValue()"
    [attr.aria-valuemax]="maxValue()"
    [attr.aria-valuenow]="normalizedValue()"
    [attr.aria-valuetext]="ariaValueText() ? ariaValueText()!(normalizedValue()) : null"
    [attr.aria-orientation]="orientation()"
    [attr.aria-disabled]="effectiveDisabled() || null"
    [attr.aria-invalid]="invalid() || null"
    [attr.data-invalid]="invalid() || null"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-labelledby]="ariaLabelledBy()"
    #sliderHandle>
    @if (handleTemplate()) {
        <ng-container
            *ngTemplateOutlet="handleTemplate() ?? null; context: { $implicit: normalizedValue() }"></ng-container>
    }
</div>
