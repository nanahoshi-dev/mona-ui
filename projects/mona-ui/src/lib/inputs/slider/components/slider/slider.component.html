<div [class]="trackClasses()"
     [attr.data-orientation]="orientation()"
     [style.height]="orientation()==='horizontal' ? trackSize():undefined"
     [style.width]="orientation()==='vertical' ? trackSize():undefined"
     [style.background]="trackBackground()">
    <div [class]="selectionClasses()"
         [attr.data-orientation]="orientation()"
         [attr.data-dragging]="dragging()"
         [style.left.%]="orientation()==='horizontal' ? selectionLeft():undefined"
         [style.right.%]="orientation()==='horizontal' ? (100 - selectionRight()):undefined"
         [style.bottom.%]="orientation()==='vertical' ? selectionLeft():undefined"
         [style.top.%]="orientation()==='vertical' ? (100 - selectionRight()):undefined"
         [style.background]="selectionBackground()"
    ></div>
</div>
@if (showTicks()) {
    <div [class]="tickListClasses()"
         [attr.data-orientation]="orientation()">
        @for (tick of renderTicks(); track tick.index) {
            <span [class]="tickClasses()"
                  [style]="tick|tickStyle:tickStyleArgs()"
                  [attr.data-orientation]="orientation()"
                  [attr.data-value]="tick.value"
                  monaSliderTick>
            </span>
        }
    </div>
}
@if (showTicks() && showLabels()) {
    <div [class]="tickLabelListClasses()"
         [attr.data-orientation]="orientation()"
         [attr.data-label-position]="labelPosition()">
        @for (tick of labelTicks(); track tick.index) {
            <span [class]="tickLabelClasses()"
                  [attr.data-orientation]="orientation()"
                  [style]="tick|labelStyle:labelStyleArgs()">
                @if (!tickValueTemplate()) {
                    <span>{{ tick.value }}</span>
                } @else {
                    <span>
                    <ng-container
                        *ngTemplateOutlet="tickValueTemplate()??null; context: {$implicit: tick.value}"></ng-container>
                    </span>
                }
            </span>
        }
    </div>
}
<div [class]="sliderHandleClasses()"
     [attr.data-orientation]="orientation()"
     [attr.data-dragging]="dragging()"
     [attr.data-focused]="primaryHandleFocused()"
     [style]="primaryHandleStyle()"
     [style.left.%]="orientation()==='horizontal' ? primaryHandlePosition() : undefined"
     [style.bottom.%]="orientation()==='vertical' ? primaryHandlePosition() : undefined"
     [attr.tabindex]="disabled()?-1:0"
     [attr.role]="'slider'"
     [attr.aria-valuemin]="min()"
     [attr.aria-valuemax]="max()"
     [attr.aria-valuenow]="handleValues()[0]"
     [attr.aria-orientation]="orientation()"
     [attr.aria-disabled]="disabled()"
     [attr.aria-label]="ranged() ? 'Minimum value' : 'Slider value'"
     #sliderHandle>
    @if (handleTemplate()) {
        <ng-container
            *ngTemplateOutlet="handleTemplate()??null; context: {$implicit: handleValues()[0]}"></ng-container>
    }
</div>
@if (ranged()) {
    <div [class]="sliderHandleClasses()"
         [attr.data-orientation]="orientation()"
         [attr.data-dragging]="dragging()"
         [attr.data-focused]="secondaryHandleFocused()"
         [style]="secondaryHandleStyle()"
         [style.left.%]="orientation()==='horizontal' ? secondaryHandlePosition() : undefined"
         [style.bottom.%]="orientation()==='vertical' ? secondaryHandlePosition() : undefined"
         [attr.tabindex]="disabled()?-1:0"
         [attr.role]="'slider'"
         [attr.aria-valuemin]="min()"
         [attr.aria-valuemax]="max()"
         [attr.aria-valuenow]="handleValues()[1]"
         [attr.aria-orientation]="orientation()"
         [attr.aria-disabled]="disabled()"
         [attr.aria-label]="'Maximum value'"
         #secondarySliderHandle>
        @if (handleTemplate()) {
            <ng-container
                *ngTemplateOutlet="handleTemplate()??null; context: {$implicit: handleValues()[1]}"></ng-container>
        }
    </div>
}
