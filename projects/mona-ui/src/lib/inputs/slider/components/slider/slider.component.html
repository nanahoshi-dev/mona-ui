<div [class]="trackClasses()"
     [attr.data-orientation]="orientation()">
    <div [class]="selectionClasses()"
         [attr.data-orientation]="orientation()"
         [attr.data-dragging]="dragging()"
         [style.width.%]="orientation()==='horizontal' ? handlePosition():undefined"
         [style.height.%]="orientation()==='vertical' ? handlePosition():undefined"
    ></div>
</div>
@if (showTicks()) {
    <div [class]="tickListClasses()"
         [attr.data-orientation]="orientation()">
        @for (tick of renderTicks(); track tick.index) {
            <span [class]="tickClasses()"
                  [style]="tick|tickStyle:tickStyleArgs()"
                  [attr.data-orientation]="orientation()"
                  [attr.data-value]="tick.value"
                  monaSliderTick>
            </span>
        }
    </div>
}
@if (showTicks() && showLabels()) {
    <div [class]="tickLabelListClasses()"
         [attr.data-orientation]="orientation()"
         [attr.data-label-position]="labelPosition()">
        @for (tick of labelTicks(); track tick.index) {
            <span class="mona-slider-tick-label"
                  [class]="tickLabelClasses()"
                  [attr.data-orientation]="orientation()"
                  [style]="tick|labelStyle:labelStyleArgs()">
                @if (!tickValueTemplate()) {
                    <span>{{ tick.value }}</span>
                } @else {
                    <span>
                    <ng-container
                        *ngTemplateOutlet="tickValueTemplate()??null; context: {$implicit: tick.value}"></ng-container>
                    </span>
                }
            </span>
        }
    </div>
}
<div class="mona-slider-handle"
     [class]="handleClasses()"
     [attr.data-orientation]="orientation()"
     [attr.data-dragging]="dragging()"
     [ngClass]="{'mona-slider-dragging': dragging()}"
     [style.left.%]="orientation()==='horizontal' ? handlePosition() : undefined"
     [style.bottom.%]="orientation()==='vertical' ? handlePosition() : undefined"
     [attr.tabindex]="disabled()?-1:0"
     #sliderHandle></div>
