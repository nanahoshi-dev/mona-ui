<label [class]="containerLabelClasses()" [attr.data-disabled]="disabled()">
    @if (labelPosition() === 'before') {
        @if (label()) {
            <span>{{ label() }}</span>
        } @else {
            <ng-content></ng-content>
        }
    }
    <input type="radio"
           [disabled]="disabled()"
           [name]="name()"
           [value]="value()"
           [ngModel]="selectedValue()"
           [class]="radioButtonClasses()"
           (blur)="onBlur($event)"
           (click)="inputClick.emit($event)"
           (focus)="inputFocus.emit($event)"
           (ngModelChange)="onSelectionChange($event)">
    <span [class]="radioButtonCircleClasses()">
        @if (value() === selectedValue()) {
            <span [class]="radioButtonIndicatorClasses()"></span>
        }
    </span>
    @if (labelPosition() === 'after') {
        @if (label()) {
            <span>{{ label() }}</span>
        } @else {
            <ng-content></ng-content>
        }
    }
</label>
