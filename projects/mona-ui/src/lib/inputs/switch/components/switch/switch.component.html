<span [class]="labelClasses()">
    @if (active() && !onLabelTemplate()) {
        <span @fadeInOut>{{labelOn()}}</span>
    }
    @if (active() && onLabelTemplate()) {
        <span @fadeInOut>
            <ng-template [ngTemplateOutlet]="onLabelTemplate()??null"></ng-template>
        </span>
    }
</span>
<span [class]="labelClasses()">
    @if (!active() && !offLabelTemplate()) {
        <span @fadeInOut>{{labelOff()}}</span>
    }
    @if (!active() && offLabelTemplate()) {
        <span @fadeInOut>
            <ng-template [ngTemplateOutlet]="offLabelTemplate()??null"></ng-template>
        </span>
    }
</span>
<span [class]="handleClasses()" [attr.tabindex]="disabled()?-1:0"></span>
