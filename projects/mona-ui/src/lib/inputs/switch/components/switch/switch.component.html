<span [class]="labelClasses()">
    @if (active() && !onLabelTemplate()) {
        <span @fadeInOut>{{ onLabel() }}</span>
    }
    @if (active() && onLabelTemplate()) {
        <span @fadeInOut>
            <ng-container [ngTemplateOutlet]="onLabelTemplate()??null"></ng-container>
        </span>
    }
</span>
<span [class]="labelClasses()">
    @if (!active() && !offLabelTemplate()) {
        <span @fadeInOut>{{ offLabel() }}</span>
    }
    @if (!active() && offLabelTemplate()) {
        <span @fadeInOut>
            <ng-container [ngTemplateOutlet]="offLabelTemplate()??null"></ng-container>
        </span>
    }
</span>
<div [class]="handleClasses()"
     [attr.data-active]="active()">
    @if (handleContentTemplate()) {
        <ng-container [ngTemplateOutlet]="handleContentTemplate()??null"
                      [ngTemplateOutletContext]="{$implicit: active()}"></ng-container>
    }
</div>
