@for (prefixTemplate of prefixTemplateList(); track $index) {
    <span class="flex items-center flex-wrap h-full">
        <ng-container *ngTemplateOutlet="prefixTemplate"></ng-container>
    </span>
}
<input [disabled]="disabled()"
       [readonly]="readonly()"
       [required]="required()"
       [placeholder]="placeholder()"
       [type]="type()"
       [class]="inputClass()"
       [style]="inputStyle()"
       [monaAttributeBinder]="inputAttributes()"
       [ngModel]="value()"
       (ngModelChange)="onValueChange($event)"
       (blur)="onInputBlur($event)"
       (focus)="inputFocus.emit($event)" />

@if (clearButton() && value().length !== 0) {
    <button monaButton look="link" size="small" class="p-0 mr-2" [tabindex]="-1" (click)="onClearClick()">
        <lucide-angular class="opacity-50 size-4 hover:opacity-90" [img]="clearIcon"></lucide-angular>
    </button>
}

@for (suffixTemplate of suffixTemplateList(); track $index) {
    <span class="flex items-center flex-wrap h-full">
        <ng-container *ngTemplateOutlet="suffixTemplate"></ng-container>
    </span>
}
