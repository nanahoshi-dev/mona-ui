@for (prefixTemplate of prefixTemplateList(); track $index) {
    <ng-container *ngTemplateOutlet="prefixTemplate"></ng-container>
}
<input monaTextBox [disabled]="disabled()"
       [required]="required()"
       [type]="'text'"
       inputmode="numeric"
       [readonly]="readonly()"
       [tabIndex]="tabindex()"
       [ngModel]="formattedValue()"
       (ngModelChange)="valueChange$.next($event)"
       (keydown)="keydown$.next($event)"
       (focus)="inputFocus.emit($event)"
       (focusout)="inputFocusOut.emit($event)"
       (blur)="onBlur($event)"
       (beforeinput)="beforeInput$.next($event)"
       (wheel)="wheel$.next($event)"
       [size]="size()"
       [class]="inputClasses()"
       autocomplete="off" tabindex="0" #valueTextBox>
@if (spinners()) {
    <div class="h-full flex flex-col border-l overflow-y-hidden border-border w-12">
        <button monaButton [disabled]="disabled()" [tabindex]="-1"
                look="ghost" [size]="size()"
                [class]="spinTopClasses()"
                (mousedown)="spin$.next('+')" (mouseup)="spinStop$.next()">
            <lucide-angular [img]="increaseIcon"></lucide-angular>
        </button>
        <button monaButton [disabled]="disabled()" [tabindex]="-1"
                look="ghost" [size]="size()"
                [class]="spinBottomClasses()"
                (mousedown)="spin$.next('-')" (mouseup)="spinStop$.next()">
            <lucide-angular [img]="decreaseIcon"></lucide-angular>
        </button>
    </div>
}
