<label [class]="containerLabelClasses()" [attr.data-disabled]="disabled()">
    @if (labelPosition() === "before") {
        <ng-container [ngTemplateOutlet]="labelTemplate"></ng-container>
    }

    <input
        type="checkbox"
        [disabled]="disabled()"
        [indeterminate]="indeterminate()"
        [required]="required()"
        [ngModel]="checked()"
        [tabindex]="disabled() ? -1 : tabIndex()"
        [class]="checkBoxClasses()"
        [attr.aria-checked]="indeterminate() ? 'mixed' : null"
        [attr.aria-label]="label() || null"
        (change)="onInputChange($event)"
        (blur)="onInputBlur($event)"
        (focus)="inputFocus.emit($event)"
        (ngModelChange)="onCheckedChange($event)"
        #checkBox />

    <span [class]="checkMarkClasses()" aria-hidden="true">
        @if (checked()) {
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-check stroke-primary-foreground">
                <path d="M18 6 9 17l-5-5" />
            </svg>
        }
    </span>
    @if (labelPosition() === "after") {
        <ng-container [ngTemplateOutlet]="labelTemplate"></ng-container>
    }
</label>

<ng-template #labelTemplate>
    @if (label()) {
        <span>{{ label() }}</span>
    } @else {
        <ng-content></ng-content>
    }
</ng-template>
