<div [class]="baseClass()" (click)="onNodeClick($event)" (contextmenu)="onNodeContextMenu($event)" #element>
    @if (treeService.nodeTemplate()) {
        <ng-container
            [ngTemplateOutlet]="treeService.nodeTemplate()"
            [ngTemplateOutletContext]="{
                $implicit: node()?.data,
                element: element.parentElement
            }"></ng-container>
    } @else {
        <span class="truncate">{{ nodeText() }}</span>
    }
</div>
