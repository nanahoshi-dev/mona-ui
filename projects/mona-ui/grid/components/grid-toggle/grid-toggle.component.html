<span
    [style.width.px]="width()"
    class="inline-flex items-center justify-center h-full aspect-square"
    (click)="onToggleDetailClick($event)">
    @if (expanded()) {
        <svg [lucideIcon]="collapseIcon()" [size]="16"></svg>
    } @else {
        <svg [lucideIcon]="expandIcon()" [size]="16"></svg>
    }
</span>
