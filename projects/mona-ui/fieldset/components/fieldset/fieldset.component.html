<fieldset [class]="fieldsetClass()" [disabled]="disabled()" [attr.name]="name()">
    @if (legendVisible()) {
        <legend [class]="legendClass()">
            @if (legendTemplate()) {
                <ng-container [ngTemplateOutlet]="legendTemplate()"></ng-container>
            } @else {
                <span>{{ legend() }}</span>
            }
        </legend>
    }
    <ng-content></ng-content>
</fieldset>
