<label [class]="containerLabelClasses()" [attr.data-disabled]="disabled()">
    @if (labelPosition() === "before") {
        <ng-container [ngTemplateOutlet]="labelTemplate"></ng-container>
    }
    <input
        type="radio"
        [disabled]="disabled()"
        [name]="name()"
        [value]="radioValue()"
        [class]="radioButtonClasses()"
        [checked]="radioValue() === value()"
        [attr.aria-invalid]="invalid() ? 'true' : null"
        (blur)="onBlur($event)"
        (click)="inputClick.emit($event)"
        (focus)="inputFocus.emit($event)"
        (change)="onSelectionChange()" />
    <span [class]="radioButtonCircleClasses()" [attr.data-invalid]="invalid() || null">
        @if (radioValue() === value()) {
            <span [class]="radioButtonIndicatorClasses()"></span>
        }
    </span>
    @if (labelPosition() === "after") {
        <ng-container [ngTemplateOutlet]="labelTemplate"></ng-container>
    }
</label>

<ng-template #labelTemplate>
    @if (label()) {
        <span>{{ label() }}</span>
    } @else {
        <ng-content></ng-content>
    }
</ng-template>
